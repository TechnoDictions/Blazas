<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blazas – Coming Soon</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .countdown {
      font-size: 1.1rem;
      color: #0ff;
    }
  </style>
</head>
<body>
  <h1>Blazas</h1>
  <p>Something powerful is coming soon. Stay tuned.</p>
  <div id="countdown" class="countdown"></div>

  <script>
    const launchDate = new Date("2025-12-01T00:00:00").getTime();
    const timer = setInterval(function () {
      const now = new Date().getTime();
      const diff = launchDate - now;
      if (diff <= 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerText = "We're Live!";
        return;
      }
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);
      document.getElementById("countdown").innerText = 
        `Launching in ${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
  </script>
</body>
</html>
