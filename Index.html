<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blazas — Coming Soon</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3.5rem;
      color: #ffb100;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.2rem;
      margin: 20px 0;
      color: #ccc;
    }
    .glow {
      color: #ff6c00;
      text-shadow: 0 0 10px #ff6c00, 0 0 20px #ff6c00;
    }
    .socials {
      margin-top: 20px;
    }
    .socials a {
      color: #ffb100;
      margin: 0 10px;
      text-decoration: none;
      font-size: 1.5rem;
      transition: transform 0.2s;
    }
    .socials a:hover {
      transform: scale(1.2);
    }
    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1 class="glow">Blazas</h1>
  <p>Your Future Hub of Innovation, Products & Powerful Ideas.</p>
  <p><strong>We're launching soon. Stay tuned!</strong></p>

  <div class="socials">
    <a href="#" title="Instagram">📸</a>
    <a href="#" title="Twitter">🐦</a>
    <a href="#" title="YouTube">▶️</a>
  </div>

  <div class="footer">© 2025 Blazas. All rights reserved.</div>
</body>
</html>
