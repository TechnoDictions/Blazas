<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>Blazas - Tech & Innovation Hub</title>
  <meta name="description" content="Blazas is a hub for tech innovations, tools, and creative web projects. Explore more as we build.">
  <meta name="robots" content="index, follow" />

  <!-- Open Graph for social preview (optional) -->
  <meta property="og:title" content="Blazas - Tech & Innovation Hub" />
  <meta property="og:description" content="Explore innovative tech projects at Blazas." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.blazas.com" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 50px;
       animation: colorShift 10s ease-in-out infinite;
      transition: background-color 2s ease-in-out;
    }
    
    @keyframes colorShift {
      0%   { background-color: #d7d4d4; }   /* red */
      20%  { background-color: #103991; }   /* blue */
      40%  { background-color: #4dff88; }   /* green */
      60%  { background-color: #c9fc2f; }   /* yellow */
      80% { background-color: #ff4dea; }   /* back to red */
      100%{ background-color: #d7d4d4;}
    }
    h1 {
      font-size: 80px;
      margin-bottom: 20px;
      color: #222;
    }
    p {
      font-size: 20px;
      color: #444;
      max-width: 700px;
      margin: 0 auto 40px;
    }
    .button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: white;
      color: #777;
      border: 2px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }
    .button:hover {
      color: #000;
      background-color: #fff;
      border-color: #000;
    }
    .pulse-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin:auto;
    }

    /* Solid center dot */
    .center {
      width: 20px;
      height: 20px;
      background: black;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* Expanding rings */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background:rgba(64, 255, 0, 0.884);
      transform: translate(-50%, -50%) scale(1);
      animation: pulse 1.5s ease-out infinite, colorShift1 10s 5s ease-in-out infinite;
    }

    /* Second ring with delay for continuous pulse */
    .ring:nth-child(2) {
      animation-delay: .6s;
    }
 @keyframes colorShift1 {
      0%   { background: #d7d4d4; }   /* red */
      20%  { background: #103991; }   /* blue */
      40%  { background: #4dff88; }   /* green */
      60%  { background: #c9fc2f; }   /* yellow */
      80% { background: #ff4dea; }   /* back to red */
      100%{ background: #d7d4d4;}
    }
    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      25% {
        transform: translate(-50%, -50%) scale(2);
        opacity:1 ;}
        50% {
        transform: translate(-50%, -50%) scale(3);
        opacity:1.1 ;}
      100% {
        transform: translate(-50%, -50%) scale(5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>Welcome To</h1>
  <h1>Blazas</h1>
  <p>Welcome to Blazas — a growing hub of technology, ideas, and creative web tools. We're currently building new projects to launch soon. Stay tuned!</p>
  <a href="blogs.blazas.com">OUR BLOGS</a>
  <!--<button class="button" onclick="changeColor()">Click to change background color</button>-->
<div class="pulse-container">
    <div class="center"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>
  <script src="script.js">
    
  </script>
</body>
</html>
