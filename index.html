<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>Blazas - Tech & Innovation Hub</title>
  <meta name="description" content="Blazas is a hub for tech innovations, tools, and creative web projects. Explore more as we build.">
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.blazas.com" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 80px;
      margin-bottom: 20px;
      color: #222;
    }
    p {
      font-size: 20px;
      color: #444;
      max-width: 700px;
      margin: 0 auto 40px;
    }
    .button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: white;
      color: #777;
      border: 2px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }
    .button:hover {
      color: #000;
      background-color: #fff;
      border-color: #000;
    }
  </style>
</head>
